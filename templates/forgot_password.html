{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block topbar %}
<div class="topbar">
  <div class="topbar-brand">🎓 CAIR Leave Portal</div>
  <div class="topbar-nav"><a href="/login">← Back to Login</a></div>
</div>
{% endblock %}

{% block content %}
<div style="max-width:460px;margin:40px auto;">
  <div class="card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:48px;">🔑</div>
      <h2 style="color:var(--primary);">Reset Password</h2>
      <p style="color:var(--muted);font-size:14px;">Enter your email to receive a reset OTP</p>
    </div>
    <div id="fpAlert" class="alert"></div>

    <!-- Step 1 -->
    <div id="step1">
      <div class="form-group">
        <label>Official Email</label>
        <input type="email" id="fpEmail" placeholder="yourname@students.iitmandi.ac.in">
      </div>
      <button class="btn btn-primary" onclick="sendReset()" style="width:100%;justify-content:center;">Send OTP</button>
    </div>

    <!-- Step 2 -->
    <div id="step2" style="display:none;">
      <div class="form-group">
        <label>OTP (sent to your email)</label>
        <input type="text" id="fpOtp" placeholder="6-digit OTP" maxlength="6">
        <small style="color:var(--muted);font-size:12px;">Expires in 5 minutes</small>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="fpPw" placeholder="Min 6 characters">
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" id="fpPw2" placeholder="Re-enter new password">
      </div>
      <button class="btn btn-primary" onclick="doReset()" style="width:100%;justify-content:center;">
        <span class="spinner" id="fpSpinner"></span> Reset Password
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
var fpType='student';

async function sendReset(){
  var email=document.getElementById('fpEmail').value.trim();
  if(!email){showAlert('fpAlert','Enter your email','error');return;}
  var r=await api('/api/otp/send','POST',{email,purpose:'reset'});
  if(r.success){
    document.getElementById('step1').style.display='none';
    document.getElementById('step2').style.display='';
    showAlert('fpAlert','OTP sent to '+email,'info');
  } else showAlert('fpAlert',r.message,'error');
}

async function doReset(){
  var email=document.getElementById('fpEmail').value.trim();
  var otp=document.getElementById('fpOtp').value.trim();
  var pw=document.getElementById('fpPw').value;
  var pw2=document.getElementById('fpPw2').value;
  if(pw!==pw2){showAlert('fpAlert','Passwords do not match','error');return;}
  if(pw.length<6){showAlert('fpAlert','Min 6 characters','error');return;}
  document.getElementById('fpSpinner').classList.add('show');
  var r=await api('/api/forgot/reset','POST',{email,otp,password:pw,type:fpType});
  document.getElementById('fpSpinner').classList.remove('show');
  if(r.success){
    showAlert('fpAlert','✅ Password reset! Redirecting…','success');
    setTimeout(()=>location.href='/login',2000);
  } else showAlert('fpAlert',r.message,'error');
}
</script>
{% endblock %}
