{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block topbar %}
<div class="topbar">
  <div class="topbar-brand">🎓 CAIR Leave Portal <span>IIT Mandi</span></div>
  <div class="topbar-nav"><a href="/">← Home</a></div>
</div>
{% endblock %}

{% block content %}
<div style="max-width:460px;margin:40px auto;">
  <div class="card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:48px;">🔐</div>
      <h2 style="color:var(--primary);margin-top:8px;" id="loginTitle">Student Sign In</h2>
    </div>

    <div id="loginAlert" class="alert"></div>

    <div class="form-group">
      <label id="emailLabel">Official Email (Institute Email)</label>
      <input type="email" id="loginEmail" placeholder="yourname@students.iitmandi.ac.in">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPw" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div style="text-align:right;margin-bottom:18px;">
      <a href="/forgot" style="font-size:13px;color:var(--primary);font-weight:600;">Forgot Password?</a>
    </div>
    <button class="btn btn-primary" onclick="doLogin()" style="width:100%;justify-content:center;">
      <span class="spinner" id="loginSpinner"></span> Sign In
    </button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
var loginType = new URLSearchParams(location.search).get('type') || 'student';
if (loginType !== 'admin') loginType = 'student';

if (loginType === 'admin') {
  document.getElementById('loginTitle').textContent = 'Admin Sign In';
  document.getElementById('emailLabel').textContent = 'Admin Email';
  document.getElementById('loginEmail').placeholder = 'admin@iitmandi.ac.in';
}

async function doLogin(){
  var email=document.getElementById('loginEmail').value.trim();
  var pw=document.getElementById('loginPw').value;
  if(!email||!pw){showAlert('loginAlert','Please fill all fields','error');return;}
  document.getElementById('loginSpinner').classList.add('show');
  var r=await api('/api/login','POST',{email,password:pw,type:loginType});
  document.getElementById('loginSpinner').classList.remove('show');
  if(r.success){location.href=r.redirect;}
  else showAlert('loginAlert',r.message,'error');
}
</script>
{% endblock %}
